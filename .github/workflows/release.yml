name: Release Go Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Build AMD64
        run: GOOS=linux GOARCH=amd64 go build -o l4d2-manager-linux-amd64 ./cli/main.go

      - name: Build ARM64
        run: GOOS=linux GOARCH=arm64 go build -o l4d2-manager-linux-arm64 ./cli/main.go

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            l4d2-manager-linux-amd64
            l4d2-manager-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
