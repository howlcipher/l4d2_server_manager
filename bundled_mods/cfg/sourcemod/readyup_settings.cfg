// ============================================================================
// L4D2 READY-UP CONFIGURATION FILE
// ============================================================================
// INSTRUCTIONS:
// 1. Place this file in your server's 'left4dead2/cfg/sourcemod/' folder.
// 2. Change the numbers inside the quotes ("") to modify how the game works.
// 3. Lines starting with // are ignored by the game, they are just for reading.
// ============================================================================

// What should the ready-up panel say at the top? (e.g., your server name)
l4d_ready_cfg_name "My Custom L4D2 Server"

// Should the AI Director be allowed to spawn Special Infected while players are waiting?
// "0" = Allow spawns (Chaos)
// "1" = Prevent spawns (Peaceful waiting)
l4d_ready_disable_spawns "1"

// Should survivors be completely frozen like statues while waiting?
// "0" = They can walk around the saferoom, but can't leave.
// "1" = They are completely frozen.
l4d_ready_survivor_freeze "0"

// How many seconds should the countdown last after everyone says !ready?
// Default: "5"
l4d_ready_delay "5"

// How should the game decide if everyone is ready?
// "0" = It counts every single player.
// "1" = It just checks if the Survivor Team as a whole and Infected Team as a whole are ready.
l4d_ready_team_based "1"

// Should the game play a loud 'Beep' sound during the countdown?
// "0" = Silent
// "1" = Play sound
l4d_ready_enable_sound "1"

// Should we teleport the entire team back if one person tries to escape early?
// "0" = Only teleport the person who tried to escape.
// "1" = Teleport the whole team.
l4d_ready_warp_team "0"
