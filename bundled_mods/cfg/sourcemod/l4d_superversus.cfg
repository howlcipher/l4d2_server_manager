// ============================================================================
// L4D SUPERVERSUS CONFIGURATION FILE
// ============================================================================
// INSTRUCTIONS:
// 1. Place this file in your server's 'left4dead2/cfg/sourcemod/' folder.
// 2. Change the numbers inside the quotes ("") to modify how the game works.
// 3. Lines starting with // are ignored by the game, they are just for reading.
// ============================================================================

// What is the absolute maximum number of Survivors allowed?
// Note: Standard L4D2 is 4. You can raise this up to 18.
l4d_survivor_limit "8"

// What is the absolute maximum number of Player-Controlled Zombies allowed?
// Note: This does not affect common zombies, only special infected players.
l4d_infected_limit "8"

// Should the Tank automatically get more health if there are more than 4 survivors?
// "0" = No, Tank always has standard health (4000).
// "1" = Yes, Tank health scales up.
l4d_supertank "1"

// If SuperTank is enabled ("1"), how much extra health should the Tank get per extra survivor?
// "0.25" means 25% extra health per extra survivor. 
// Example: If there are 6 survivors (2 extra), the Tank gets 50% more health (6000 total).
l4d_tank_hpmulti "0.25"

// Should extra survivor bots be given a free Medkit when they spawn?
// "0" = No, they spawn with empty hands.
// "1" = Yes, they spawn with a first aid kit.
l4d_XtraHP "1"

// (ADVANCED) Should we clear the lobby reservation? 
// Only set this to "1" if you are using the Left4DownTown extension and people are failing to join.
l4d_killreservation "0"
